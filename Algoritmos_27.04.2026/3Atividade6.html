<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teoria de Pitágoras</title>
</head>

<body style="background-color: aqua;">

    <h1>Programa para somar B = 3 e C = 4</h1>
    <label for="inputA">Coloque o número 3 no B</label>
    <input type="number" name="inputB" id="inputB">
    <br>
    <label for="inputB">Coloque o número 4 no B</label>
    <input type="number" name="inputC" id="inputC">
    <br>
    <input type="button" name="calcular" id="calcular" value="Somar" onclick="pitagoras()">
    <br>
    <span id="resposta">O resultado do teorema é</span>

    <script>

        function pitagoras() {
            let b = parseFloat(document.getElementById("inputB").value);
            let c = parseFloat(document.getElementById("inputC").value);
            return Math.sqrt(b ** 2 + c ** 2);
        }
        let h = pitagoras(3, 4);
        console.log("O valor da hipotenusa é " + h)
        document.getElementById("resposta").innerHTML = h;

    </script>
</body>

</html>
