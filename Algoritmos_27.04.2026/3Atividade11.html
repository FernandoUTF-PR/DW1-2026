<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>preço</title>
</head>

<body style="background-color: aqua;">

    <h1>Programa aonde Preço = 150 e o desconto é de 10% </h1>
    <label for="inputA">Coloque o número 150 no preço</label>
    <input type="number" name="inputA" id="inputA">
    <br>
    <label for="inputB">Coloque o número 5 na Altura</label>
    <input type="number" name="inputB" id="inputB">
    <br>

    <input type="button" name="calcular" id="calcular" value="Somar" onclick="price()">
    <br>
    <span id="resposta">O resultado do cálculo é</span>

    <script>
        function price() {
            let preco = 150;
            let desconto = 10; // 10%
            let precoFinal = preco * (1 - desconto / 100);
            console.log("6. Preço com 10% de desconto =", precoFinal);
        }
    </script>
</body>

</html>
