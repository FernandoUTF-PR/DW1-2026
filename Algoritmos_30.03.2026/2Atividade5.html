<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa de subtração de porcentagem</title>
</head>

<body>
    <h1>Programa exemplo que subtrai a porcentagem</h1>
    <!-- Programa em HTML e JavaScript para somar 2 números -->
    <label for="inputN1">X (valor com porcentagem)</label>
    <input type="number" name="inputN1" id="inputN1">
    <br>
    <label for="inputN2">Y (valor da porcentagem)</label>
    <input type="number" name="inputN2" id="inputN2">
    <br>
    <input type="button" value="Calcular" onclick="funcaoResponsavelPeloCalculo()">
    <br>
    <label for="resposta">x - x . y = </label>
    <span id="resposta">?</span>

    <script>
        function funcaoResponsavelPeloCalculo() {
            let x = parseFloat(document.getElementById("inputN1").value);
            let y = parseFloat(document.getElementById("inputN2").value);

            let s = x - (x * (y * 0.01));
            document.getElementById("resposta").innerHTML = s;
        }
    </script>

</body>

</html>
