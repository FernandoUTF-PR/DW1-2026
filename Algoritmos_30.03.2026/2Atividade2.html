<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplicação de termo X por 2</title>
</head>

<body>
    <h1>Programa exemplo que multiplica o número</h1>
    <!-- Programa em HTML e JavaScript para somar 2 números -->
    <label for="inputN1">X</label>
    <input type="number" name="inputN1" id="inputN1">
    <br>

    <br>
    <input type="button" value="multiplicar" onclick="funcaoResponsavelPeloCalculo()">
    <br>
    <label for="resposta">x . 2 = </label>
    <span id="resposta">?</span>

    <script>
        function funcaoResponsavelPeloCalculo() {
            let x = parseFloat(document.getElementById("inputN1").value);
            let s = x*2;
            document.getElementById("resposta").innerHTML = s;
        }
    </script>

</body>

</html>
